<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SubjectiveBet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .card-hover { transition: all 0.3s } .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3) }
  </style>
</head>
<body class="bg-[#0d1117] text-white min-h-screen">
  <nav class="bg-[#161b22] border-b border-gray-800 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2"><span class="text-2xl">⚽</span><h1 class="text-xl font-bold">SubjectiveBet</h1></div>
    <span class="bg-green-900/50 text-green-400 text-xs px-3 py-1 rounded-full">Live on GenLayer</span>
  </nav>

  <main class="max-w-4xl mx-auto p-6">
    <!-- Create Market -->
    <section class="bg-[#161b22] rounded-2xl p-6 border border-gray-800 mb-6">
      <h2 class="text-lg font-bold text-orange-400 mb-4">Create Market</h2>
      <div class="grid md:grid-cols-2 gap-3">
        <input placeholder="Question (e.g. Who was MOTM?)" class="bg-[#0d1117] border border-gray-700 rounded-xl px-4 py-3 placeholder-gray-600 outline-none col-span-2">
        <input placeholder="Sport" class="bg-[#0d1117] border border-gray-700 rounded-xl px-4 py-3 placeholder-gray-600 outline-none">
        <input placeholder="Match info" class="bg-[#0d1117] border border-gray-700 rounded-xl px-4 py-3 placeholder-gray-600 outline-none">
        <input placeholder='Options JSON: ["Player A","Player B","Player C"]' class="bg-[#0d1117] border border-gray-700 rounded-xl px-4 py-3 placeholder-gray-600 outline-none col-span-2">
      </div>
      <button class="w-full mt-3 bg-orange-600 hover:bg-orange-500 rounded-xl py-3 font-bold transition">Create Market</button>
    </section>

    <!-- Example Market Cards -->
    <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider mb-3">Active Markets</h3>
    <div class="space-y-4">
      <div class="card-hover bg-[#161b22] rounded-2xl p-5 border border-gray-800">
        <div class="flex justify-between items-start mb-3">
          <div>
            <p class="font-semibold">Who was best player in CL final 2024?</p>
            <p class="text-xs text-gray-500 mt-1">⚽ Real Madrid vs Dortmund</p>
          </div>
          <span class="bg-yellow-900/50 text-yellow-400 text-xs px-2 py-1 rounded-full">Resolved</span>
        </div>
        <div class="grid grid-cols-3 gap-2">
          <button class="bg-gray-800 border border-gray-700 rounded-lg py-3 text-center hover:border-orange-500 transition">
            <span class="block text-sm">Vinicius Jr</span>
            <span class="text-xs text-gray-500">33%</span>
          </button>
          <button class="bg-gray-800 border border-gray-700 rounded-lg py-3 text-center hover:border-orange-500 transition">
            <span class="block text-sm">Carvajal</span>
            <span class="text-xs text-gray-500">25%</span>
          </button>
          <button class="bg-orange-900/30 border border-orange-600 rounded-lg py-3 text-center">
            <span class="block text-sm font-bold text-orange-400">Bellingham ✓</span>
            <span class="text-xs text-orange-300">Winner</span>
          </button>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
