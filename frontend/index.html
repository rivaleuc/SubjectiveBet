<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SubjectiveBet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 0 auto; padding: 2rem; background: #0a0a0a; color: #e0e0e0; }
    h1 { margin-bottom: 1rem; color: #7c4dff; }
    h2 { margin: 1.5rem 0 0.5rem; color: #b388ff; }
    input, button, select { padding: 0.5rem; border-radius: 4px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; margin: 0.25rem 0; width: 100%; }
    button { background: #7c4dff; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #651fff; }
    .card { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 1rem; margin: 0.5rem 0; }
    .log { background: #1a1a1a; padding: 0.5rem; margin-top: 0.5rem; font-size: 0.85rem; white-space: pre-wrap; border-radius: 4px; max-height: 200px; overflow-y: auto; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { h, render, Component } from 'https://esm.sh/preact@10.19.3';
    import htm from 'https://esm.sh/htm@3.1.1';
    const html = htm.bind(h);

    const API = 'http://localhost:4000/api';

    class App extends Component {
      constructor() {
        super();
        this.state = { log: '', contractAddr: '', marketKey: '' };
      }

      log(msg) { this.setState(s => ({ log: msg + '\n' + s.log })); }

      async callContract(method, args) {
        this.log(`Calling ${method}...`);
        try {
          const res = await fetch(`${API}/call`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contract: this.state.contractAddr, method, args })
          });
          const data = await res.json();
          this.log(`Result: ${JSON.stringify(data)}`);
          return data;
        } catch (e) { this.log(`Error: ${e.message}`); }
      }

      async createMarket(e) {
        e.preventDefault();
        const f = e.target;
        const result = await this.callContract('create_market', [
          f.question.value, f.sport.value, f.match_info.value, f.options.value
        ]);
        if (result) this.setState({ marketKey: result.result || '' });
      }

      async placeBet(e) {
        e.preventDefault();
        const f = e.target;
        await this.callContract('place_bet', [f.market_key.value, parseInt(f.option_index.value)]);
      }

      async resolveMarket(e) {
        e.preventDefault();
        const f = e.target;
        await this.callContract('resolve_market', [f.rmarket_key.value]);
      }

      render() {
        return html`
          <h1>⚽ SubjectiveBet</h1>
          <p>Subjective sports predictions resolved by AI consensus</p>

          <div class="card">
            <label>Contract Address</label>
            <input value=${this.state.contractAddr} onInput=${e => this.setState({ contractAddr: e.target.value })} placeholder="GenLayer contract address" />
          </div>

          <h2>Create Market</h2>
          <form class="card" onSubmit=${e => this.createMarket(e)}>
            <input name="question" placeholder="Was the ref wrong on the penalty?" required />
            <input name="sport" placeholder="Football" required />
            <input name="match_info" placeholder="Arsenal vs Chelsea, 2024-03-15" required />
            <input name="options" placeholder='["yes","no"]' required />
            <button type="submit">Create Market</button>
          </form>

          <h2>Place Bet</h2>
          <form class="card" onSubmit=${e => this.placeBet(e)}>
            <input name="market_key" placeholder="market_1" value=${this.state.marketKey} required />
            <input name="option_index" type="number" placeholder="Option index (0, 1, ...)" required />
            <button type="submit">Place Bet</button>
          </form>

          <h2>Resolve Market</h2>
          <form class="card" onSubmit=${e => this.resolveMarket(e)}>
            <input name="rmarket_key" placeholder="market_1" value=${this.state.marketKey} required />
            <button type="submit">Resolve (AI Judges)</button>
          </form>

          <h2>Log</h2>
          <div class="log">${this.state.log || 'No activity yet.'}</div>
        `;
      }
    }

    render(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
